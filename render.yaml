databases:
  - name: hris-postgres
    plan: basic-256mb
    region: oregon
    databaseName: hris
    user: hris

services:
  # ── Django API ──────────────────────────────────────────────────────
  - type: web
    name: hris-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: true          # ✅ redeploy on every git push
    healthCheckPath: /api/health/  # ✅ fixes Render's HEAD / returning 404
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hris-postgres
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "hris-backend.onrender.com,.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://hris-frontend.onrender.com"
      - key: FRONTEND_BASE_URL
        value: "https://hris-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: INVITE_ACCEPT_PATH
        value: "/accept-invite"
      - key: INVITE_EXPIRE_DAYS
        value: "7"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin12345"
      - key: DJANGO_SUPERUSER_FIRST_NAME
        value: "Admin"
      - key: DJANGO_SUPERUSER_LAST_NAME
        value: "User"

  # ── React Frontend (Static Site) ───────────────────────────────────
  - type: web
    name: hris-frontend
    runtime: static         # ✅ static runtime, no "plan" field needed
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hris-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html